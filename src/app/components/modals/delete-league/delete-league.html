<div class="overlay">
  <div class="modal-box">
    <div class="modal-box__icon">
      <svg
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
        <path d="M10 11v6M14 11v6M9 6V4h6v2" />
      </svg>
    </div>

    <p class="modal-box__title">¿Estás seguro?</p>
    <p class="modal-box__subtitle">
      Esta acción eliminará la liga permanentemente y no se puede deshacer.
    </p>

    <div class="modal-box__buttons">
      <button class="modal-box__buttons--denied" (click)="cancelled.emit()">
        No, cancelar
      </button>
      <button class="modal-box__buttons--accept" (click)="confirmed.emit()">
        Sí, eliminar
      </button>
    </div>
  </div>
</div>

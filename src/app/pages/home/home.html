@if(!loading()){
<div class="home">
  <div class="home__header">
    <h1 class="home__header--title">
      Bienvenido de nuevo
      <span class="home__header--title-span">{{user?.name}}</span>
    </h1>
    <section class="home__header--countdown">
      <article class="home__header--countdown-time">
        <p class="p">Dias <span class="p-time"> {{days()}} </span></p>
      </article>
      <article class="home__header--countdown-time">
        <p class="p">Horas <span class="p-time"> {{hours()}} </span></p>
      </article>
      <article class="home__header--countdown-time">
        <p class="p">Minutos <span class="p-time"> {{minutes()}} </span></p>
      </article>
      <article class="home__header--countdown-time">
        <p class="p">Segundos <span class="p-time"> {{seconds()}} </span></p>
      </article>
    </section>
  </div>
  <div class="home__content">
    <section class="home__content--leagues">
      <h2 class="home__content--leagues-title">TUS LIGAS:</h2>
      <article class="home__content--leagues-league">
        @if(!leagues() || leagues()?.length === 0){
        <p>NO PARTICIPAS EN NINGUNA LIGA TODAVIA</p>
        } @else{ @for(liga of leagues(); track liga.id){
        <div class="home__content--leagues-league-card">
          <app-card-league
            [liga]="liga"
            [user_id]="this.user?.id!"
            (onCopy)="copyToTheClipboard($event)"
          ></app-card-league>
        </div>
        }}
      </article>
    </section>
  </div>
</div>
} @else{
<div class="loading">
  <img
    src="/loading.gif"
    alt="Icono de carga"
    title="Icono de carga"
    aria-label="Loading icon"
    class="loading__gif"
  />
</div>
}
